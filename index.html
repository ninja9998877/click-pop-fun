<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一击爆分</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: Arial; overflow: hidden; text-align: center; }
        canvas { display: block; margin: 0 auto; background: #111; }
        #score { position: absolute; top: 10px; left: 10px; font-size: 24px; }
        #combo { position: absolute; top: 50px; left: 10px; font-size: 20px; color: #ff0; }
        button { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 10px 20px; font-size: 18px; background: #ff3366; color: white; border: none; cursor: pointer; }
        #start { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 15px 30px; font-size: 24px; z-index: 10; }
    </style>
</head>
<body>
    <div id="score">分数: 0</div>
    <div id="combo">Combo: 0</div>
    <canvas id="game" width="800" height="600"></canvas>
    <button id="restart" onclick="restart()" style="display:none;">重新开始</button>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        let score = 0;
        let combo = 0;
        let balls = [];
        let particles = [];

        class Ball {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * (canvas.height * 0.7);
                this.r = 20 + Math.random() * 20;
                this.color = ['#ff3366', '#33ff99', '#4488ff', '#ffcc33', '#aa66ff'][Math.floor(Math.random()*5)];
                this.vx = (Math.random() - 0.5) * 5;
                this.vy = (Math.random() - 0.5) * 5;
                this.value = Math.floor(Math.random() * 25) + 15;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < this.r || this.x > canvas.width - this.r) this.vx *= -1;
                if (this.y < this.r || this.y > canvas.height - this.r) this.vy *= -1;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 14px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(this.value, this.x, this.y + 5);
            }
        }

        function spawnBall() {
            balls.push(new Ball());
            if (balls.length > 12) balls.shift();
        }

        function checkClick(x, y) {
            for (let i = balls.length - 1; i >= 0; i--) {
                let b = balls[i];
                let dx = b.x - x;
                let dy = b.y - y;
                if (dx*dx + dy*dy < b.r * b.r) {
                    balls.splice(i, 1);
                    score += b.value + combo * 10;
                    createParticles(b.x, b.y, b.color);
                    combo++;
                    updateUI();
                    if (combo >= 3) {
                        createExplosion(b.x, b.y);
                    }
                    return true;
                }
            }
            combo = Math.max(0, combo - 1);
            updateUI();
            return false;
        }

        function updateUI() {
            document.getElementById('score').textContent = `分数: ${score}`;
            document.getElementById('combo').textContent = `Combo: ${combo}x`;
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                this.vx = (Math.random()-0.5)*14;
                this.vy = (Math.random()-0.5)*14 - 4;
                this.life = 35;
                this.color = color;
                this.size = 7 + Math.random()*5;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                this.vy += 0.25; this.life--;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.life / 35;
                ctx.fillRect(this.x, this.y, this.size, this.size);
            }
        }

        function createParticles(x, y, color) {
            for (let i = 0; i < 30; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function createExplosion(x, y) {
            createParticles(x, y, '#ffff00');
            score += 150;
            ctx.fillStyle = '#ffff00';
            ctx.font = 'bold 40px Arial';
            ctx.fillText('BLAST!', x-60, y-30);
        }

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            checkClick(x, y);
            if (score > 100 && document.getElementById('restart').style.display === 'none') {
                document.getElementById('restart').style.display = 'block';
            }
        });

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            balls.forEach(b => { b.update(); b.draw(); });
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.update();
                p.draw();
                if (p.life <= 0) particles.splice(i, 1);
            }
            ctx.globalAlpha = 1;
            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            balls = [];
            particles = [];
            score = 0;
            combo = 0;
            updateUI();
            for (let i = 0; i < 6; i++) spawnBall();
            setInterval(spawnBall, 600);
            gameLoop();
        }

        function restart() {
            document.getElementById('restart').style.display = 'none';
            startGame();
        }

        window.onload = () => {
            startGame();
            setTimeout(() => {
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 22px Arial';
                ctx.fillText('点击彩球连击！30秒内爆分', 150, 150);
            }, 300);
        };
    </script>
</body>
</html>
